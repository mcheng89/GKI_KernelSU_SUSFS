name: LTS Download Speed Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix:
        branch:
          - android16-6.12-lts
        sync_profile:
          - name: baseline
          - name: no-tags
          - name: force-sync
          - name: fast-fetch
          - name: retry-only
          - name: full-mix
        sync_mode:
          - name: unset
            mode: unset
          - name: j4
            mode: 4
          - name: j8
            mode: 8
          - name: j16
            mode: 16
          - name: all
            mode: all
    name: ${{ matrix.branch }} / ${{ matrix.sync_profile.name }} / repo sync ${{ matrix.sync_mode.name }}
    steps:
      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/.local/bin/repo"
          chmod +x "$HOME/.local/bin/repo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Benchmark repo sync
        shell: bash
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/kernel-speed-test/${{ matrix.branch }}/${{ matrix.sync_mode.name }}"
          mkdir -p "$workdir"
          cd "$workdir"

          branch="common-${{ matrix.branch }}"
          repo init -u https://android.googlesource.com/kernel/manifest -b "$branch" --depth=1

          sync_cmd=(repo sync -c)

          case "${{ matrix.sync_profile.name }}" in
            baseline)
              ;;
            no-tags)
              sync_cmd+=(--no-tags)
              ;;
            force-sync)
              sync_cmd+=(--no-tags --force-sync)
              ;;
            fast-fetch)
              sync_cmd+=(--no-clone-bundle --optimized-fetch)
              ;;
            retry-only)
              sync_cmd+=(--no-tags --retry-fetches=3)
              ;;
            full-mix)
              sync_cmd+=(--fail-fast --no-tags --force-sync --no-clone-bundle --optimized-fetch --retry-fetches=3)
              ;;
            *)
              echo "Unknown sync profile: ${{ matrix.sync_profile.name }}" >&2
              exit 1
              ;;
          esac

          case "${{ matrix.sync_mode.mode }}" in
            unset)
              ;;
            4)
              sync_cmd+=(-j4)
              ;;
            8)
              sync_cmd+=(-j8)
              ;;
            16)
              sync_cmd+=(-j16)
              ;;
            all)
              sync_cmd+=(-j"$(nproc)")
              ;;
            *)
              echo "Unknown sync mode: ${{ matrix.sync_mode.mode }}" >&2
              exit 1
              ;;
          esac

          start_ns=$(date +%s%N)
          timeout 20m "${sync_cmd[@]}"
          end_ns=$(date +%s%N)
          elapsed_ms=$(( (end_ns - start_ns) / 1000000 ))

          {
            echo "## LTS download benchmark"
            echo
            echo "- Branch: \`${{ matrix.branch }}\`"
            echo "- Profile: \`${{ matrix.sync_profile.name }}\`"
            echo "- Sync mode: \`${{ matrix.sync_mode.name }}\`"
            echo "- Elapsed: ${elapsed_ms} ms"
          } >> "$GITHUB_STEP_SUMMARY"
