name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config
  
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      cat common/arch/arm64/configs/gki_defconfig
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

      cat /home/runner/out/common/.config || true

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ -f "/home/runner/out/dist/Image" ]; then
        echo "Found Image at /home/runner/out/dist/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Image"
          echo "Kernel Version:"
          strings "/home/runner/out/dist/Image" | grep -m1 "^Linux version "
        fi
        exit 0
      fi
      if [ -f "/home/runner/out/Image" ]; then
        echo "Found Image at /home/runner/out/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi

      exit 1

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch

  - name: 'Create Bootimgs Folder and Copy Images for Android 14/15'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      # Determine build mode name based on bypass input
      if [[ "${{ inputs.bypass }}" == "true" ]]; then
        MODE="Bypass"
      else
        MODE="Normal"
      fi
      ANDROID_PART="$(echo "${{ inputs.version }}" | cut -d- -f1)"
      if [[ "$ANDROID_PART" != "android14" && "$ANDROID_PART" != "android15" ]]; then
        echo "Not android14/15; skipping bootimgs creation."
        exit 0
      fi
      mkdir -p "${{ github.workspace }}/bootimgs-${MODE}"
      if [ -f "/home/runner/out/dist/Image" ]; then
        SRC_IMG="/home/runner/out/dist/Image"
      elif [ -f "/home/runner/out/Image" ]; then
        SRC_IMG="/home/runner/out/Image"
      else
        echo "ERROR: No Image found for bootimgs creation (${MODE}); cannot continue." >&2
        exit 1
      fi

      cp "$SRC_IMG" "${{ github.workspace }}/bootimgs-${MODE}/Image"
      cp "$SRC_IMG" "${{ github.workspace }}/bootimgs-${MODE}/${MODE}-Image"
      cp "${SRC_IMG}.lz4" "${{ github.workspace }}/bootimgs-${MODE}/Image.lz4"
      cp "${SRC_IMG}.lz4" "${{ github.workspace }}/bootimgs-${MODE}/${MODE}-Image.lz4"

      # Generate gzip for workspace Image
      gzip -n -k -f -9 "${{ github.workspace }}/bootimgs-${MODE}/Image" > "${{ github.workspace }}//bootimgs-${MODE}/Image.gz"
      gzip -n -k -f -9 "${{ github.workspace }}/bootimgs-${MODE}/${MODE}-Image" > "${{ github.workspace }}//bootimgs-${MODE}/${MODE}-Image.gz"

  - name: 'Android 13/14/15 boot image build script'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      # Determine mode (Normal/Bypass)
      if [[ "${{ inputs.bypass }}" == "true" ]]; then
        MODE="Bypass"
      else
        MODE="Normal"
      fi
      ANDROID_PART="$(echo "${{ inputs.version }}" | cut -d- -f1)"
      if [[ "$ANDROID_PART" != "android13" && "$ANDROID_PART" != "android14" && "$ANDROID_PART" != "android15" ]]; then
        echo "Not android13/14/15; skipping boot image creation."
        exit 0
      fi

      # Require `BOOT_SIGN_KEY_PATH` to be set to a filesystem path by download-kernel
      if [ -z "${BOOT_SIGN_KEY_PATH:-}" ] || [ ! -f "$BOOT_SIGN_KEY_PATH" ]; then
        echo "ERROR: BOOT_SIGN_KEY_PATH not set or not a file; cannot sign boot image for $MODE" >&2
        exit 1
      fi

      if [ ! -d "${{ github.workspace }}/bootimgs-${MODE}" ]; then
        echo "bootimgs-${MODE} not found; cannot build boot.img" >&2
        exit 1
      fi

      MKBOOTIMG_PATH="${MKBOOTIMG:-$(command -v mkbootimg 2>/dev/null || true)}"
      AVBTOOL_PATH="${AVBTOOL:-$(command -v avbtool 2>/dev/null || true)}"
      if [ -z "$MKBOOTIMG_PATH" ]; then
        echo "ERROR: mkbootimg not found; cannot create boot image for $MODE" >&2
        exit 1
      fi
      if [ -z "$AVBTOOL_PATH" ]; then
        echo "ERROR: avbtool not found; cannot sign boot image for $MODE" >&2
        exit 1
      fi

      pushd "${{ github.workspace }}/bootimgs-${MODE}" >/dev/null
      "$MKBOOTIMG_PATH" --header_version 4 --kernel Image --output boot.img
      "$AVBTOOL_PATH" add_hash_footer \
        --partition_name boot \
        --partition_size $((64 * 1024 * 1024)) \
        --image boot.img \
        --algorithm SHA256_RSA2048 \
        --key "$BOOT_SIGN_KEY_PATH"
      cp ./boot.img ./${MODE}-boot.img
      popd >/dev/null

